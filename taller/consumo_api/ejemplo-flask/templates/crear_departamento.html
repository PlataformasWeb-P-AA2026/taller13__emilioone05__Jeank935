<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Crear departamento</title>
  </head>
  <body>
    <p>
      <a href="/">Inicio</a> |
      <a href="/los/departamentos">Ver departamentos</a>
    </p>
    <h5>Crear departamento</h5>

    <form method="post">
      <p>
        <label>Nombre completo del propietario</label><br />
        <input type="text" name="nombre_completo_propietario" required />
      </p>
      <p>
        <label>Costo del departamento</label><br />
        <input type="number" name="costo_departamento" min="0" step="0.01" required />
      </p>
      <p>
        <label>Numero de cuartos</label><br />
        <input type="number" name="numero_cuartos" min="1" required />
      </p>
      <p>
        <label>Edificio</label><br />
        <select name="edificio" required>
          {% for edificio in edificios %}
          <option value="{{edificio['id']}}">
            {{edificio['nombre']}} - {{edificio['ciudad']}}
          </option>
          {% endfor %}
        </select>
      </p>
      <button type="submit">Guardar</button>
    </form>
  </body>
</html>
